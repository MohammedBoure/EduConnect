<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء منشور جديد</title>
     <style>
        /* ... نفس التنسيقات ... */
        body { font-family: sans-serif; padding: 20px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; }
        button { padding: 10px 15px; cursor: pointer; }
        #message { margin-top: 15px; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>إنشاء منشور جديد (إدارة)</h1>

    <form id="createPostForm">
        <label for="title">العنوان:</label>
        <input type="text" id="title" name="title" required>

        <label for="content">المحتوى:</label>
        <textarea id="content" name="content" rows="5" required></textarea>

        <label for="image">رابط الصورة (اختياري):</label>
        <input type="url" id="image" name="image">

        <button type="submit">إنشاء المنشور</button>
    </form>

    <div id="message"></div>

     <script>
        const API_BASE_URL = 'https://educonnect-wp9t.onrender.com'; // أو http://127.0.0.1:5000
        const createPostForm = document.getElementById('createPostForm');
        const messageDiv = document.getElementById('message');

        createPostForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageDiv.innerHTML = '';
            messageDiv.className = '';

            const token = localStorage.getItem('access_token');
            const userId = localStorage.getItem('user_id'); // الحصول على معرف المستخدم المسجل

            if (!token || !userId) {
                messageDiv.textContent = 'خطأ: يجب تسجيل الدخول لإنشاء منشور.';
                messageDiv.className = 'error';
                return;
            }

            const formData = new FormData(createPostForm);
            const postData = {
                user_id: parseInt(userId), // تأكد من أن معرف المستخدم هو رقم
                title: formData.get('title'),
                content: formData.get('content'),
                image: formData.get('image') || null // أرسل null أو لا ترسل المفتاح إذا كانت الصورة اختيارية وفارغة
            };

            // إزالة حقل الصورة إذا كان فارغًا واختياريًا
             if (!postData.image) {
                delete postData.image;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/posts/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(postData)
                });

                const result = await response.json();

                if (response.ok) {
                    messageDiv.textContent = `تم إنشاء المنشور بنجاح! معرف المنشور: ${result.post.id}`;
                    messageDiv.className = 'success';
                    createPostForm.reset();
                } else {
                    messageDiv.textContent = `خطأ (${response.status}): ${result.error || result.message || 'فشل في إنشاء المنشور.'}`;
                    messageDiv.className = 'error';
                }

            } catch (error) {
                 console.error('فشل إنشاء المنشور:', error);
                messageDiv.textContent = 'حدث خطأ في الشبكة أو في الاتصال بالخادم.';
                messageDiv.className = 'error';
            }
        });
     </script>
</body>
</html>
