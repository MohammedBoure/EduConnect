<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-container label {
            display: block;
            margin-bottom: 8px;
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-container button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" name="email" required>
            
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">تسجيل الدخول</button>
        </form>
        <div class="result" id="result"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault(); // منع إرسال النموذج بشكل افتراضي

            // الحصول على القيم المدخلة
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // البيانات التي سيتم إرسالها عبر fetch
            const url = "https://educonnect-wp9t.onrender.com/api/login";
            const data = {
                email: email,
                mot_de_passe: password
            };

            // إرسال الطلب باستخدام fetch
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(({ status, body }) => {
                // عرض النتيجة على الصفحة
                const resultElement = document.getElementById('result');
                if (status === 200) {
                    resultElement.innerHTML = `<p>تم تسجيل الدخول بنجاح!</p>`;
                } else {
                    resultElement.innerHTML = `<p>خطأ: ${body.message || 'بيانات غير صحيحة'}</p>`;
                }
            })
            .catch(error => {
                const resultElement = document.getElementById('result');
                resultElement.innerHTML = `<p>حدث خطأ: ${error}</p>`;
            });
        });
    </script>

</body>
</html>
