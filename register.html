<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مستخدم جديد</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>تسجيل مستخدم جديد</h1>
        <div id="message" class="message" style="display: none;"></div>

        <form id="registerForm">
            <label for="first_name">الاسم الأول:</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">الاسم الأخير:</label>
            <input type="text" id="last_name" name="last_name" required>

            <label for="email">البريد الإلكتروني:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">كلمة المرور (8 أحرف على الأقل):</label>
            <input type="password" id="password" name="password" minlength="8" required>

            <label for="department">القسم/التخصص:</label>
            <input type="text" id="department" name="department" required>

            <label for="skills">المهارات (مثال: Java, Python):</label>
            <input type="text" id="skills" name="skills" required>

            <label for="photo">رابط الصورة (اختياري):</label>
            <input type="url" id="photo" name="photo">

            <button type="submit" id="submitBtn">تسجيل</button>
        </form>
        <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            hideMessage('message');
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري التسجيل...';

            const formData = new FormData(form);
            const userData = {};
            formData.forEach((value, key) => {
                 userData[key] = value;
            });
             // إزالة حقل الصورة إذا كان فارغًا (لأنه اختياري)
            if (!userData.photo) {
                delete userData.photo;
            }

            const result = await apiRegister(userData);

            if (result.ok) {
                showMessage('message', `تم التسجيل بنجاح! معرف المستخدم: ${result.data.user.id}. يمكنك الآن تسجيل الدخول.`, 'success');
                form.reset();
            } else {
                showMessage('message', `فشل التسجيل: ${result.error}`, 'error');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'تسجيل';
        });
    </script>
</body>
</html>
