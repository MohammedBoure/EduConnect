<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل بيانات المستخدم</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
     <nav>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="admin_users.html">إدارة المستخدمين</a></li>
            <li><a href="admin_posts.html">إدارة المنشورات</a></li>
            <li><a href="#" id="logoutBtn">تسجيل الخروج</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>تعديل بيانات المستخدم</h1>
        <div id="message" class="message" style="display: none;"></div>
        <div id="loading" class="loading">جاري تحميل بيانات المستخدم...</div>

        <form id="editUserForm" style="display: none;">
            <input type="hidden" id="user_id" name="id"> <!-- حقل مخفي للمعرف -->

            <label for="first_name">الاسم الأول:</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">الاسم الأخير:</label>
            <input type="text" id="last_name" name="last_name" required>

            <label for="email">البريد الإلكتروني:</label>
            <input type="email" id="email" name="email" required>

            <label for="department">القسم/التخصص:</label>
            <input type="text" id="department" name="department" required>

            <label for="skills">المهارات (مثال: Java, Python):</label>
            <input type="text" id="skills" name="skills" required>

            <label for="photo">رابط الصورة:</label>
            <input type="url" id="photo" name="photo">

             <label for="role">الدور:</label>
             <select id="role" name="role" required>
                <option value="user">مستخدم (user)</option>
                <option value="admin">مشرف (admin)</option>
             </select>
            <br><br>

            <button type="submit" id="submitBtn">حفظ التغييرات</button>
            <a href="admin_users.html"><button type="button">إلغاء</button></a>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        // حماية الصفحة
        redirectToLoginIfNotAuthenticated();

        const form = document.getElementById('editUserForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const logoutBtn = document.getElementById('logoutBtn');

        // الحصول على ID المستخدم من عنوان URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        async function loadUserDetails() {
            if (!userId) {
                 showMessage('message', 'لم يتم تحديد معرف المستخدم.', 'error');
                 loadingDiv.style.display = 'none';
                 return;
            }

            const result = await apiGetUserDetails(userId);
            loadingDiv.style.display = 'none';

            if (result.ok) {
                const user = result.data;
                // ملء النموذج بالبيانات الحالية
                document.getElementById('user_id').value = user.id;
                document.getElementById('first_name').value = user.first_name || '';
                document.getElementById('last_name').value = user.last_name || '';
                document.getElementById('email').value = user.email || '';
                document.getElementById('department').value = user.department || '';
                // تحويل المهارات (إذا كانت مصفوفة) إلى نص
                const skillsText = Array.isArray(user.skills) ? user.skills.join(', ') : (user.skills || '');
                document.getElementById('skills').value = skillsText;
                document.getElementById('photo').value = user.photo || '';
                document.getElementById('role').value = user.role || 'user'; // افتراضي user

                form.style.display = 'block'; // إظهار النموذج بعد ملئه
            } else {
                showMessage('message', `فشل تحميل بيانات المستخدم: ${result.error}`, 'error');
            }
        }

        form.addEventListener('submit', async (event) => {
             event.preventDefault();
             hideMessage('message');
             submitBtn.disabled = true;
             submitBtn.textContent = 'جاري الحفظ...';

             const formData = new FormData(form);
             const updatedData = {};
             formData.forEach((value, key) => {
                // تحويل المهارات النصية إلى مصفوفة إذا كانت API التحديث تتوقع مصفوفة
                // بناءً على مثال الـ API، يبدو أنها تتوقع مصفوفة عند التحديث
                if (key === 'skills') {
                    updatedData[key] = value.split(',').map(skill => skill.trim()).filter(skill => skill); // تنظيف وتقسيم المهارات
                } else if (key !== 'id') { // لا نرسل الـ ID في الجسم
                    updatedData[key] = value;
                }
             });
             // التأكد من أن photo لا يرسل كـ "" إذا كان فارغًا (قد يسبب خطأ)
             if (updatedData.photo === '') {
                 delete updatedData.photo; // أو أرسل null حسب تصميم الـ API
             }


             const currentUserId = formData.get('id'); // الحصول على ID من الحقل المخفي
             const result = await apiUpdateUser(currentUserId, updatedData);

             if (result.ok) {
                 showMessage('message', 'تم تحديث بيانات المستخدم بنجاح!', 'success');
                 // يمكنك البقاء في الصفحة أو إعادة التوجيه
                 // window.location.href = 'admin_users.html';
             } else {
                 showMessage('message', `فشل تحديث بيانات المستخدم: ${result.error}`, 'error');
             }

             submitBtn.disabled = false;
             submitBtn.textContent = 'حفظ التغييرات';
        });

        // إضافة مستمع لزر الخروج
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                logout();
            }
        });

        // تحميل بيانات المستخدم عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadUserDetails);
    </script>
</body>
</html>
