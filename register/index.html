<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مستخدم جديد</title>
    <link rel="stylesheet" href="../assets/css/register.css">
</head>
<body>
    <div class="container">
        <h1>تسجيل مستخدم جديد</h1>
        
        <form id="registration-form">
            <div class="form-group">
                <label for="nom">الاسم:</label>
                <input type="text" id="nom" name="nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">اللقب:</label>
                <input type="text" id="prenom" name="prenom" required>
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="mot_de_passe">كلمة المرور:</label>
                <input type="password" id="mot_de_passe" name="mot_de_passe" required>
            </div>

            <div class="form-group">
                <label for="filiere">التخصص:</label>
                <input type="text" id="filiere" name="filiere" required>
            </div>

            <div class="form-group">
                <label for="competences">المهارات (افصل بين المهارات باستخدام الفاصلة):</label>
                <input type="text" id="competences" name="competences" required>
            </div>

            <div class="form-group">
                <label for="photo">رابط الصورة الشخصية:</label>
                <input type="url" id="photo" name="photo" required>
            </div>

            <button type="submit">تسجيل</button>
        </form>

        <div id="response"></div>
    </div>

    <script>
        // الدالة لإرسال البيانات إلى الـ API
        document.getElementById('registration-form').addEventListener('submit', function(event) {
            event.preventDefault();  // لمنع إرسال النموذج بشكل تقليدي
            
            const url = "https://educonnect-wp9t.onrender.com/api/register";
            const data = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                mot_de_passe: document.getElementById('mot_de_passe').value,
                filiere: document.getElementById('filiere').value,
                competences: document.getElementById('competences').value.split(',').map(item => item.trim()), // تحويل المهارات إلى مصفوفة
                photo: document.getElementById('photo').value
            };

            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(({ status, body }) => {
                document.getElementById('response').innerHTML = `<p>الحالة: ${status}</p><p>الاستجابة: ${JSON.stringify(body)}</p>`;
            })
            .catch(error => {
                document.getElementById('response').innerHTML = `<p>خطأ: ${error}</p>`;
            });
        });
    </script>
</body>
</html>
