<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء منشور جديد</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
         <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="admin_users.html">إدارة المستخدمين</a></li>
            <li><a href="admin_posts.html">إدارة المنشورات</a></li>
            <li><a href="#" id="logoutBtn">تسجيل الخروج</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>إنشاء منشور جديد</h1>
        <div id="message" class="message" style="display: none;"></div>

        <form id="createPostForm">
            <label for="title">العنوان:</label>
            <input type="text" id="title" name="title" required>

            <label for="content">المحتوى:</label>
            <textarea id="content" name="content" rows="6" required></textarea>

            <label for="image">رابط الصورة (اختياري):</label>
            <input type="url" id="image" name="image">

            <button type="submit" id="submitBtn">إنشاء المنشور</button>
             <a href="admin_posts.html"><button type="button">إلغاء</button></a>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        // حماية الصفحة
        redirectToLoginIfNotAuthenticated();

        const form = document.getElementById('createPostForm');
        const submitBtn = document.getElementById('submitBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            hideMessage('message');
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الإنشاء...';

            const formData = new FormData(form);
            const postData = {
                title: formData.get('title'),
                content: formData.get('content'),
                image: formData.get('image') || null, // أرسل null إذا فارغ
                 // user_id سيتم إضافته تلقائيًا في apiCreatePost من المستخدم المسجل
            };

            const result = await apiCreatePost(postData);

            if (result.ok) {
                 showMessage('message', `تم إنشاء المنشور بنجاح! ID: ${result.data.post.id}`, 'success');
                 form.reset(); // مسح النموذج بعد النجاح
                 // يمكنك إعادة التوجيه إلى قائمة المنشورات
                 // setTimeout(() => { window.location.href = 'admin_posts.html'; }, 1500);
            } else {
                showMessage('message', `فشل إنشاء المنشور: ${result.error}`, 'error');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'إنشاء المنشور';
        });

         // إضافة مستمع لزر الخروج
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                logout();
            }
        });
    </script>
</body>
</html>
